name: Windows Package

on:
  workflow_dispatch:
  push:
    branches:
      - dev/windows-native-support
  pull_request:
    paths:
      - "electron/**"
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "pyproject.toml"
      - ".github/workflows/windows-package.yml"

jobs:
  package-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: python -m pip install -e .
      - run: npm ci
      - run: npm test
      - run: npm run package:win:ci
      - run: npm run verify:package:win:engine

      - uses: actions/upload-artifact@v4
        with:
          name: rippopotamus-win-unpacked
          path: release/win-unpacked
