name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: python -m pip install -e .
      - run: npm ci
      - run: npm test
