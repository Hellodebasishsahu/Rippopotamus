<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:660px; height:420px; overflow:hidden; }
  body {
    font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;
    color:#f5f5f7;
    background:
      radial-gradient(120% 90% at 18% 28%, rgba(90,200,250,.16), transparent 55%),
      radial-gradient(120% 90% at 82% 30%, rgba(255,193,64,.13), transparent 55%),
      linear-gradient(160deg,#141416 0%, #0b0b0d 100%);
    position:relative;
  }
  .wordmark {
    position:absolute; top:34px; left:0; right:0; text-align:center;
    font-size:26px; font-weight:700; letter-spacing:-.01em;
  }
  .tagline {
    position:absolute; top:70px; left:0; right:0; text-align:center;
    font-size:12.5px; font-weight:500; color:rgba(235,235,245,.5); letter-spacing:.02em;
  }
  /* icon slots: macOS overlays the real icons on top, centered at these points.
     app center (165,180), Applications center (495,180) — matched in tauri.conf. */
  .slot-ring {
    position:absolute; width:132px; height:132px; top:114px; border-radius:26px;
    border:1px dashed rgba(255,255,255,.10);
  }
  .slot-app { left:99px; }
  .slot-apps { left:429px; }
  .arrow {
    position:absolute; top:168px; left:250px; width:160px; height:24px;
  }
  .hint {
    position:absolute; bottom:34px; left:0; right:0; text-align:center;
    font-size:13px; font-weight:600; color:rgba(235,235,245,.62);
  }
  .hint b { color:#f5f5f7; }
</style>
</head>
<body>
  <div class="wordmark">Rippopotamus</div>
  <div class="tagline">Local-first media downloader</div>

  <div class="slot-ring slot-app"></div>
  <div class="slot-ring slot-apps"></div>

  <svg class="arrow" viewBox="0 0 160 24">
    <defs>
      <linearGradient id="g" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="160" y2="0">
        <stop offset="0" stop-color="#5ac8fa"/>
        <stop offset="1" stop-color="#ffc140"/>
      </linearGradient>
    </defs>
    <line x1="4" y1="12" x2="138" y2="12" stroke="url(#g)" stroke-width="5" stroke-linecap="round"/>
    <polygon points="134,2 158,12 134,22" fill="url(#g)"/>
  </svg>

  <div class="hint">Drag <b>Rippopotamus</b> onto <b>Applications</b> to install</div>
</body>
</html>
